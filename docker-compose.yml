services:
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: vault
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vault_secret}
      POSTGRES_DB: legacy_ai_vault
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vault -d legacy_ai_vault"]
      interval: 5s
      timeout: 3s
      retries: 10

  frontend:
    build: 
      context: ./frontend
    ports:
      - "8080:80"
    environment:
      - VITE_API_URL=/api
    depends_on:
      - backend
      - ai-service

  backend:
    build:
      context: ./backend
    ports:
      - "3001:3001"
    env_file:
      - ./.env
    environment:
      - PORT=3001
      - AI_SERVICE_URL=http://ai-service:5000
      - DATABASE_URL=postgresql://vault:${POSTGRES_PASSWORD:-vault_secret}@postgres:5432/legacy_ai_vault
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

  ai-service:
    build:
      context: ./ai_service
    ports:
      - "5000:5000"
    env_file:
      - ./.env
    environment:
      - LOG_LEVEL=INFO

volumes:
  pgdata:
  uploads:
