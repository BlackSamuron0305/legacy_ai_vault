services:
  frontend:
    build: 
      context: ./frontend
    ports:
      - "8080:80"
    environment:
      - VITE_API_URL=/api
    depends_on:
      - backend
      - ai-service

  backend:
    build:
      context: ./backend
    ports:
      - "3001:3001"
    env_file:
      - ./.env
    environment:
      - PORT=3001
      - AI_SERVICE_URL=http://ai-service:5000
  ai-service:
    build:
      context: ./backend/ai_service
    ports:
      - "5000:5000"
    env_file:
      - ./.env
    environment:
      - FLASK_ENV=production
