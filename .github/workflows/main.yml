name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Install dependencies
      run: |
        cd backend
        npm ci
    - name: Lint (typecheck)
      run: |
        cd backend
        npx tsc --noEmit
    - name: Run tests
      run: |
        cd backend
        npm test
      env:
        JWT_SECRET: test-secret-for-ci
        DATABASE_URL: postgresql://localhost:5432/test

  frontend-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Install dependencies
      run: |
        cd frontend
        npm ci
    - name: Run tests
      run: |
        cd frontend
        npm run test

  python-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install dependencies
      run: |
        cd ai_service
        pip install -r requirements.txt
    - name: Run tests
      run: |
        cd ai_service
        python -m pytest tests/ -v

  docker-compose-check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Validate docker-compose
      run: docker-compose config
